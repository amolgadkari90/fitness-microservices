version: '3.8'

services:

  config-server:
    build: ./configuration-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      - config-server
      - eureka-server

  activity-service:
    build: ./activity-service
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - eureka-server

  ai-service:
    build: ./ai-service
    ports:
      - "8083:8083"
    depends_on:
      - config-server
      - eureka-server