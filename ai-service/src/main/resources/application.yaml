# ==========================================
# Spring Boot Application Configuration
# ==========================================
spring:

  # --------------------------------------
  # Application Identity
  # --------------------------------------
  application:
    name: aiservice   # MUST match config file name in Config Server (aiservice.yml)

  # --------------------------------------
  # Spring Cloud Config Client
  # --------------------------------------
  config:
    # Fetch configuration from Config Server
    # 'optional:' ensures service still starts if Config Server is unavailable
    import: optional:configserver:http://localhost:8888

# --------------------------------------
# Embedded Server Configuration
# --------------------------------------
server:
  port: 8083   # Fallback port (can be overridden by Config Server)

# --------------------------------------
# Eureka Service Discovery Configuration (Fallback)
# --------------------------------------
eureka:
  client:
    service-url:
      # Environment override supported (fallback if Config Server is unavailable)
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

    # Heartbeat every 10 seconds
    lease-renewal-interval-in-seconds: 10

    # Remove instance if no heartbeat within 30 seconds
    lease-expiration-duration-in-seconds: 30