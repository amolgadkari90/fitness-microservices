# ==============================
# Spring Boot Application Config
# ==============================
spring:

  # --------------------------------
  # Application Identity
  # --------------------------------
  application:
    name: activity-service   # MUST match config file name in Config Server (activity-service.yml)

  # --------------------------------
  # Spring Cloud Config Client
  # --------------------------------
  config:
    # Fetch configuration from Config Server
    # 'optional:' ensures service still starts if Config Server is unavailable
    import: optional:configserver:http://localhost:8888

# --------------------------------
# Embedded Server Configuration
# --------------------------------
server:
  port: 8082   # Fallback port (can be overridden by Config Server)

# --------------------------------
# Eureka Service Discovery Config (Fallback)
# --------------------------------
eureka:
  client:
    service-url:
      # Default Eureka server location (fallback if Config Server is unavailable)
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30