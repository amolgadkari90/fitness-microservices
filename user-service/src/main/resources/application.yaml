# =========================================
# Spring Boot Application Configuration
# =========================================
spring:

  # ---------------------------------
  # Application Identity
  # ---------------------------------
  application:
    name: user-service   # MUST match config file name in Config Server (user-service.yml)

  # ---------------------------------
  # Spring Cloud Config Client
  # ---------------------------------
  config:
    # Fetch configuration from Config Server
    # 'optional:' ensures service still starts if Config Server is unavailable
    import: optional:configserver:http://localhost:8888

# ---------------------------------
# Embedded Server Configuration
# ---------------------------------
server:
  port: 8081   # Fallback port (can be overridden by Config Server)

# ---------------------------------
# Eureka Service Discovery (Fallback)
# ---------------------------------
eureka:
  client:
    service-url:
      # Default Eureka server location (fallback if Config Server is unavailable)
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true   # Register this service with Eureka
    fetch-registry: true         # Fetch registry for service-to-service communication

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}