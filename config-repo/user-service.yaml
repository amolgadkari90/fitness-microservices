# =========================================
# Spring Boot Application Configuration
# (Centralized Configuration - Loaded via Config Server)
# =========================================
spring:

  # ---------------------------------
  # MySQL Database Configuration
  # ---------------------------------
  datasource:
    # Externalized DB connection details (should come from environment variables)
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---------------------------------
  # JPA / Hibernate Configuration
  # ---------------------------------
  jpa:
    hibernate:
      ddl-auto: update   # Use 'validate' or 'none' in production
    show-sql: true       # Disable in production for performance
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ---------------------------------
  # Apache Kafka Configuration
  # ---------------------------------
  kafka:
    # Kafka broker address (local development)
    # Replace with broker hostname in Docker/Kubernetes environments
    bootstrap-servers: localhost:9092

    producer:
      # String key serializer (recommended for event keys)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      # JSON serializer for sending POJO events
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # Prevent type metadata headers unless required by consumers
      properties:
        spring.json.add.type.headers: false

    # ---------------------------------
    # Custom Kafka Topic Configuration
    # ---------------------------------
    topic:
      name: activity-event   # Topic used for publishing user events

# ---------------------------------
# Logging Configuration
# ---------------------------------
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    com.fitness.userservice: DEBUG