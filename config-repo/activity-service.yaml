# ==============================
# Spring Boot Application Config
# ==============================
spring:

  # --------------------------------
  # Application Identity
  # --------------------------------
  application:
    name: activity-service   # Service name registered in Eureka and used across logs

  # --------------------------------
  # MongoDB Configuration
  # --------------------------------
  data:
    mongodb:
      uri: mongodb+srv://${mongo.username}:${mongo.password}@${mongo.cluster}/${mongo.database}?retryWrites=true&w=majority&appName=${spring.application.name}
      auto-index-creation: false

  # --------------------------------
  # Apache Kafka Configuration
  # --------------------------------
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# --------------------------------
# Custom Kafka Properties  ✅ FIXED
# --------------------------------
kafka:
  topic:
    name: activity.events.v1   # Topic used for publishing activity events

# --------------------------------
# Mongo Credentials (Externalized)
# --------------------------------
mongo:
  username: ${MONGO_USERNAME}
  password: ${MONGO_PASSWORD}
  cluster: ${MONGO_CLUSTER}
  database: ${MONGO_DATABASE}

# --------------------------------
# Embedded Server Configuration
# --------------------------------
server:
  port: 8082

# --------------------------------
# Eureka Service Discovery Config
# --------------------------------
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30