# ==========================================
# Spring Boot Application Configuration
# (Centralized Configuration - Loaded via Config Server)
# ==========================================
spring:

  # --------------------------------------
  # MongoDB Configuration (Mongo Atlas)
  # --------------------------------------
  data:
    mongodb:
      # MongoDB Atlas connection string
      # Credentials resolved from 'mongo' section below
      uri: mongodb+srv://${mongo.username}:${mongo.password}@${mongo.cluster}/${mongo.database}?retryWrites=true&w=majority&appName=${spring.application.name}

      # Disable automatic index creation
      # Recommended for production stability
      auto-index-creation: false

  # --------------------------------------
  # Apache Kafka Configuration (Consumer)
  # --------------------------------------
  kafka:
    # Kafka broker address (local development)
    # Replace localhost with container hostname in Docker/K8s
    bootstrap-servers: localhost:9092

    consumer:
      # Consumer group (shared across AI service instances)
      group-id: activity-processor-group

      # Must match producer key serializer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # JSON deserializer for ActivityEvent
      # ✅ Updated to ErrorHandlingDeserializer for reliable delegation
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      # Start from earliest offset if no committed offset exists
      auto-offset-reset: earliest

      properties:
        # ✅ Explicit delegate to JsonDeserializer (fix for Config Server binding issues)
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        # Ignore type headers since producer disabled them
        spring.json.use.type.headers: false

        # Default target class for deserialization
        spring.json.value.default.type: com.fitness.events.ActivityEvent

        # Restrict this in production (avoid "*")
        spring.json.trusted.packages: "*"

    # --------------------------------------
    # Kafka Listener Configuration
    # --------------------------------------
    listener:
      # Manual acknowledgment mode
      # Offset committed ONLY after acknowledgment.acknowledge()
      ack-mode: manual

# --------------------------------------
# Custom Mongo Credential Properties
# --------------------------------------
mongo:
  username: ${MONGO_USERNAME}   # Externalized MongoDB username
  password: ${MONGO_PASSWORD}   # Externalized MongoDB password
  cluster: ${MONGO_CLUSTER}     # MongoDB Atlas cluster
  database: ${MONGO_AI_DB}   	# Target database name

# --------------------------------------
# Custom Gemini url and key Properties
# --------------------------------------
Gemini:
  url: ${GEMINI_URL}   # Externalized Gemini API URL
  key: ${GEMINI_KEY}   # Externalized Gemini API Key