server:
  port: 8084

spring:
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE   # same as http://USER-SERVICE, but with load balancing
          predicates:
            - Path=/api/v1/users/**
          # Optional future filters
          # filters:
          #   - StripPrefix=3
        
        - id: activity-service
          uri: lb://activity-service                 #ACTIVITY-SERVICE
          predicates:
            - Path=/api/v1/activities/**
          # filters:
          #   - StripPrefix=3

        - id: ai-service
          uri: lb://ai-service                       #AI-SERVICE
          predicates:
            - Path=/api/v1/recommendations/**
          # filters:
          #   - StripPrefix=3


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO