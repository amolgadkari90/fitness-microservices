eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
      # Environment override supported (fallback if Config Server is unavailable)

# Routing
spring:
  cloud:
    gateway:
      # ✅ Prevent case-sensitivity issues
      discovery:
        locator:
          lower-case-service-id: true
          
      routes:
        - id: user-service
          uri: lb://user-service # lb -> load balanced user-service
          predicates:
            - Path=/api/v1/users/**
              # User service controller -> @RequestMapping("/api/v1/users")
              # so any request coming to API-Gateway -> http://localhost:8084/api/v1/users
              # that will map to USER-SERVICE
